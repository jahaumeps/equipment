name: Deploy to GitHub Pages

on:
  # 當程式碼推送到 main 分支時觸發
  push:
    branches: ["main"]

  # 允許手動從 Actions 頁面執行
  workflow_dispatch:

# 設定權限，允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 確保同一時間只有一個部署任務在執行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 編譯工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 這裡的路徑要根據你的編譯輸出目錄修改（通常是 dist, build 或 .）
          path: ./dist

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
